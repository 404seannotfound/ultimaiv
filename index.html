<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Casting — ultimaiv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --candle-amber: #f6c170;
    --candle-glow: #c98a2b;
    --deep-indigo: #1a1530;
    --shadow: #0a0608;
    --parchment: #efdfb3;
    --parchment-dim: #cbb88a;
    --ink: #2a1f10;
    --bright-stone: #f3ebd0;
    --dark-stone: #161214;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--parchment);
    background: var(--shadow);
    user-select: none;
  }

  /* --- Wagon background, full-bleed with vignette --- */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(ellipse at 50% 60%, transparent 30%, rgba(0,0,0,0.55) 75%, rgba(0,0,0,0.85) 100%),
      url('scenes/wagon_interior.jpeg') center 55% / cover no-repeat;
  }

  /* --- Abacus across the top --- */
  #abacus {
    position: absolute;
    top: 2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.4vw;
    padding: 1.2vh 2vw;
    background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.25));
    border-radius: 999px;
    border: 1px solid rgba(246,193,112,0.18);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .stone {
    width: 2.4vh; height: 2.4vh;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff8dd 0%, var(--bright-stone) 40%, #b8a878 100%);
    box-shadow: 0 0 14px var(--bright-stone), inset 0 -2px 4px rgba(0,0,0,0.3);
    transition: all 600ms ease;
    position: relative;
  }
  .stone[data-state="dark"] {
    background: radial-gradient(circle at 35% 30%, #2a2428 0%, var(--dark-stone) 60%, #050308 100%);
    box-shadow: inset 0 -1px 3px rgba(0,0,0,0.6), inset 0 1px 2px rgba(80,60,40,0.2);
  }
  .stone[data-state="active"] {
    box-shadow: 0 0 22px var(--virtue-color, var(--bright-stone)), 0 0 6px #fff;
    background: radial-gradient(circle at 35% 30%, #fff8dd 0%, var(--virtue-color, var(--bright-stone)) 70%, #6b5430 100%);
  }
  .stone-label {
    position: absolute;
    top: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    font-family: 'IM Fell English SC', serif;
    font-size: 0.85vh;
    color: var(--parchment-dim);
    white-space: nowrap;
    opacity: 0.7;
    text-transform: lowercase;
    letter-spacing: 0.08em;
  }

  /* --- Cards-in-play, centered on the painted table --- */
  #table-area {
    position: absolute;
    top: 18vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4vw;
    align-items: center;
    justify-content: center;
    height: 50vh;
    perspective: 1500px;
  }
  .card-slot {
    width: 22vh;
    aspect-ratio: 2 / 3;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 900ms cubic-bezier(.2,.7,.2,1), opacity 700ms ease;
    cursor: default;
  }
  .card-slot.flipped { transform: rotateY(180deg); }
  .card-slot.discarded {
    opacity: 0;
    transform: rotateY(180deg) translateX(var(--discard-x, -30vw)) translateY(-10vh) rotate(-15deg) scale(0.7);
    pointer-events: none;
  }
  .card-slot.selectable { cursor: pointer; }
  .card-slot.selectable:hover { transform: rotateY(180deg) translateY(-1.5vh) scale(1.03); }
  .card-face, .card-back-face {
    position: absolute; inset: 0;
    border-radius: 1.2vh;
    background-size: cover; background-position: center;
    box-shadow: 0 12px 36px rgba(0,0,0,0.6), 0 0 0 1px rgba(246,193,112,0.25);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .card-back-face { background-image: url('scenes/card_back.jpeg'); }
  .card-face { transform: rotateY(180deg); }

  /* --- Final reveal card (full-screen) --- */
  #reveal {
    position: absolute; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 50%, rgba(20,12,30,0.85), rgba(0,0,0,0.97) 70%);
    z-index: 10;
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  #reveal.shown { display: flex; opacity: 1; }
  #reveal-card {
    width: 60vh;
    aspect-ratio: 2 / 3;
    background-size: cover;
    background-position: center;
    border-radius: 1.5vh;
    box-shadow: 0 0 80px var(--virtue-color, #f6c170), 0 20px 60px rgba(0,0,0,0.8);
    transform: scale(0.6);
    opacity: 0;
    transition: all 2.2s cubic-bezier(.2,.7,.2,1);
  }
  #reveal.shown #reveal-card { transform: scale(1); opacity: 1; }

  /* --- Dialogue panel --- */
  #dialogue {
    position: absolute;
    left: 50%;
    bottom: 3vh;
    transform: translateX(-50%);
    width: min(82vw, 1100px);
    padding: 2.4vh 3vw 2vh;
    background:
      linear-gradient(180deg, rgba(40,28,18,0.78), rgba(20,12,8,0.92)),
      radial-gradient(circle at 20% 20%, rgba(246,193,112,0.08), transparent 50%);
    border: 1px solid rgba(246,193,112,0.28);
    border-radius: 1.2vh;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(246,193,112,0.1);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    gap: 1.4vh;
    z-index: 5;
  }
  #dialogue-header { display: flex; align-items: center; gap: 1.2vw; }
  #gypsy-avatar {
    width: 6vh; height: 6vh;
    border-radius: 50%;
    background-image: url('scenes/gypsy.jpeg');
    background-size: 230% auto;
    background-position: 50% 22%;
    border: 2px solid rgba(246,193,112,0.5);
    box-shadow: 0 0 16px rgba(246,193,112,0.3);
    flex-shrink: 0;
  }
  #gypsy-name {
    font-family: 'IM Fell English SC', serif;
    font-size: 1.6vh;
    letter-spacing: 0.14em;
    color: var(--candle-amber);
  }
  #gypsy-speech {
    font-style: italic;
    font-size: 2.4vh;
    line-height: 1.45;
    color: var(--parchment);
    min-height: 6vh;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  #scene-text {
    font-size: 2.1vh;
    line-height: 1.45;
    color: var(--parchment-dim);
    padding-left: 1vw;
    border-left: 2px solid rgba(246,193,112,0.4);
    margin-left: 0.5vw;
    min-height: 0;
  }
  #scene-text:empty { display: none; }
  #choices {
    display: flex;
    gap: 2vw;
    justify-content: stretch;
    margin-top: 0.4vh;
  }
  .choice {
    flex: 1;
    padding: 1.6vh 1.5vw;
    background: linear-gradient(180deg, rgba(60,40,20,0.55), rgba(20,12,6,0.75));
    border: 1px solid rgba(246,193,112,0.35);
    color: var(--parchment);
    font-family: inherit;
    font-size: 1.8vh;
    line-height: 1.35;
    border-radius: 0.8vh;
    cursor: pointer;
    transition: all 250ms ease;
    text-align: left;
  }
  .choice:hover {
    background: linear-gradient(180deg, rgba(120,80,40,0.7), rgba(60,30,15,0.85));
    border-color: var(--candle-amber);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.5), 0 0 14px rgba(246,193,112,0.2);
  }
  .choice-virtue {
    display: block;
    font-family: 'IM Fell English SC', serif;
    font-size: 1.3vh;
    letter-spacing: 0.14em;
    color: var(--candle-amber);
    margin-bottom: 0.4vh;
    opacity: 0.85;
  }
  .next-btn {
    align-self: center;
    padding: 1.4vh 4vw;
    background: linear-gradient(180deg, rgba(120,80,40,0.6), rgba(60,30,15,0.8));
    border: 1px solid rgba(246,193,112,0.5);
    color: var(--candle-amber);
    font-family: 'IM Fell English SC', serif;
    font-size: 1.6vh;
    letter-spacing: 0.2em;
    border-radius: 999px;
    cursor: pointer;
    transition: all 250ms ease;
  }
  .next-btn:hover {
    background: linear-gradient(180deg, rgba(180,120,60,0.7), rgba(100,60,25,0.9));
    box-shadow: 0 0 20px rgba(246,193,112,0.4);
  }

  /* --- Whisper, last beat --- */
  #whisper {
    position: absolute; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 11;
    background: rgba(0,0,0,0.92);
    opacity: 0;
    transition: opacity 2.2s ease;
  }
  #whisper.shown { display: flex; opacity: 1; }
  #whisper-text {
    font-style: italic;
    font-size: 3.2vh;
    color: var(--parchment);
    text-shadow: 0 0 24px var(--candle-amber);
    text-align: center;
    max-width: 60vw;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 2s ease;
  }
  #whisper.shown #whisper-text { opacity: 0.9; }

  /* --- Permalink reveal at the very end --- */
  #permalink-panel {
    position: absolute;
    bottom: 6vh; left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.4vh;
    opacity: 0;
    transition: opacity 2s ease;
  }
  #permalink-panel.shown { display: flex; opacity: 1; }
  #permalink-text {
    font-family: 'IM Fell English SC', serif;
    color: var(--parchment-dim);
    font-size: 1.6vh;
    letter-spacing: 0.18em;
  }
  #permalink-url {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--candle-amber);
    font-size: 2.4vh;
    text-decoration: underline;
    text-decoration-color: rgba(246,193,112,0.4);
  }
  #replay {
    margin-top: 1vh;
    background: transparent;
    border: 1px solid rgba(246,193,112,0.3);
    color: var(--parchment-dim);
    padding: 1vh 3vw;
    font-family: 'IM Fell English SC', serif;
    font-size: 1.3vh;
    letter-spacing: 0.18em;
    border-radius: 999px;
    cursor: pointer;
    transition: all 200ms;
  }
  #replay:hover { border-color: var(--candle-amber); color: var(--candle-amber); }

  /* --- Subtle candle flicker on the whole stage --- */
  @keyframes flicker {
    0%, 100% { filter: brightness(1); }
    45%      { filter: brightness(1.04); }
    50%      { filter: brightness(0.97); }
    72%      { filter: brightness(1.03); }
  }
  #stage { animation: flicker 7.3s ease-in-out infinite; }

  .fade-in { animation: fadein 1.4s ease forwards; }
  @keyframes fadein { from {opacity: 0;} to {opacity: 1;} }

  /* --- Intro overlay (satisfies browser autoplay gating) --- */
  #intro {
    position: absolute; inset: 0;
    z-index: 20;
    display: flex;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 3vh;
    background: radial-gradient(ellipse at 50% 50%, rgba(20,12,30,0.6), rgba(0,0,0,0.92) 80%);
    transition: opacity 1.6s ease;
    cursor: pointer;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  #intro-title {
    font-family: 'IM Fell English SC', serif;
    font-size: 3.6vh;
    letter-spacing: 0.3em;
    color: var(--candle-amber);
    text-shadow: 0 0 24px rgba(246,193,112,0.5);
    text-align: center;
  }
  #intro-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 2vh;
    color: var(--parchment-dim);
    max-width: 50vw;
    text-align: center;
    line-height: 1.45;
  }
  #intro-enter {
    margin-top: 2vh;
    padding: 1.6vh 4vw;
    background: linear-gradient(180deg, rgba(120,80,40,0.6), rgba(60,30,15,0.8));
    border: 1px solid rgba(246,193,112,0.5);
    color: var(--candle-amber);
    font-family: 'IM Fell English SC', serif;
    font-size: 1.6vh;
    letter-spacing: 0.22em;
    border-radius: 999px;
    cursor: pointer;
    transition: all 250ms;
  }
  #intro-enter:hover {
    background: linear-gradient(180deg, rgba(180,120,60,0.7), rgba(100,60,25,0.9));
    box-shadow: 0 0 20px rgba(246,193,112,0.4);
  }

  /* --- Card Browser (also serves /cards) --- */
  #card-browser {
    position: fixed; inset: 0;
    z-index: 30;
    display: none;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(20,12,30,0.55) 0%, rgba(0,0,0,0.96) 78%),
      url('scenes/wagon_interior.jpeg') center 55% / cover no-repeat;
    opacity: 0;
    transition: opacity 1.0s ease;
  }
  #card-browser.cb-shown { display: flex; opacity: 1; }
  .cb-stage {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1.05fr;
    gap: 4vw;
    align-items: center;
    padding: 6vh 6vw 10vh;
    max-width: 1500px;
    margin: 0 auto;
  }
  @media (max-width: 720px) {
    .cb-stage { grid-template-columns: 1fr; padding: 8vh 6vw 14vh; gap: 3vh; overflow-y: auto; }
    .cb-card { max-width: 38vh; justify-self: center; }
    .cb-info { max-width: 90vw; }
    .cb-virtue { font-size: 4.2vh; }
  }
  .cb-stage { overflow-y: auto; }
  .cb-card {
    width: 100%;
    max-width: 46vh;
    justify-self: end;
    aspect-ratio: 2 / 3;
    border-radius: 1.5vh;
    background-size: cover; background-position: center;
    box-shadow: 0 0 60px var(--cb-glow, rgba(246,193,112,0.35)), 0 24px 60px rgba(0,0,0,0.7);
    transform-origin: center;
    transition: opacity 380ms ease, transform 380ms ease, box-shadow 600ms ease;
  }
  .cb-card.fade { opacity: 0; transform: scale(0.97); }
  .cb-info {
    color: var(--parchment);
    max-width: 56ch;
    align-self: center;
  }
  .cb-mantra {
    font-family: 'IM Fell English SC', serif;
    font-size: 2.2vh;
    letter-spacing: 0.5em;
    color: var(--cb-glow, var(--candle-amber));
    margin-bottom: 0.8vh;
    text-shadow: 0 0 18px rgba(246,193,112,0.3);
  }
  .cb-virtue {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 6vh;
    line-height: 1;
    margin: 0 0 1.6vh;
    color: var(--parchment);
    letter-spacing: 0.02em;
  }
  .cb-meta {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 2vh;
    color: var(--parchment-dim);
    margin-bottom: 2.4vh;
    border-bottom: 1px solid rgba(246,193,112,0.18);
    padding-bottom: 2vh;
    line-height: 1.5;
  }
  .cb-meta span { display: inline-block; margin-right: 1.4vw; white-space: nowrap; }
  .cb-meta b {
    font-family: 'IM Fell English SC', serif;
    font-style: normal;
    font-weight: normal;
    color: var(--candle-amber);
    letter-spacing: 0.12em;
    margin-right: 0.4vw;
    font-size: 1.5vh;
    text-transform: lowercase;
  }
  .cb-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2vh;
    line-height: 1.55;
    color: var(--parchment);
  }
  .cb-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(246,193,112,0.3);
    color: var(--candle-amber);
    width: 6vh; height: 6vh;
    border-radius: 50%;
    font-size: 3.2vh;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 200ms ease;
    line-height: 0;
  }
  .cb-nav:hover { background: rgba(40,28,18,0.85); border-color: var(--candle-amber); box-shadow: 0 0 16px rgba(246,193,112,0.4); }
  .cb-prev { left: 2vw; }
  .cb-next { right: 2vw; }
  .cb-close {
    position: absolute;
    top: 2.4vh; right: 2.4vw;
    background: transparent;
    border: none;
    color: var(--parchment-dim);
    font-size: 4vh;
    cursor: pointer;
    line-height: 1;
    transition: color 180ms;
    padding: 0.4vh 1.2vw;
  }
  .cb-close:hover { color: var(--candle-amber); }
  /* Cultivation suggestions inside the info panel */
  .cb-cultivate {
    margin-top: 2.4vh;
    padding-top: 2vh;
    border-top: 1px solid rgba(246,193,112,0.18);
  }
  .cb-cultivate-heading {
    font-family: 'IM Fell English SC', serif;
    font-size: 1.5vh;
    letter-spacing: 0.18em;
    color: var(--cb-glow, var(--candle-amber));
    margin-bottom: 1.2vh;
    text-transform: lowercase;
  }
  .cb-cultivate ul {
    list-style: none;
    margin: 0; padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0.8vh;
  }
  .cb-cultivate li {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.9vh;
    line-height: 1.45;
    color: var(--parchment);
    padding-left: 1.6vw;
    position: relative;
  }
  .cb-cultivate li::before {
    content: '·';
    position: absolute;
    left: 0.4vw;
    color: var(--cb-glow, var(--candle-amber));
    font-size: 2.4vh;
    line-height: 1;
    top: 0.1vh;
  }

  /* Thumbnail strip — replaces the old dots */
  .cb-thumbs {
    position: absolute;
    bottom: 8.2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1vw;
    padding: 1vh 1.4vw;
    background: rgba(0,0,0,0.5);
    border-radius: 1.2vh;
    border: 1px solid rgba(246,193,112,0.18);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    max-width: 92vw;
    overflow-x: auto;
  }
  .cb-thumb {
    width: 5.4vh;
    aspect-ratio: 2 / 3;
    border-radius: 0.4vh;
    background-size: cover;
    background-position: center;
    cursor: pointer;
    opacity: 0.55;
    transition: all 240ms;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .cb-thumb:hover { opacity: 0.95; transform: translateY(-3px) scale(1.04); }
  .cb-thumb.current {
    opacity: 1;
    box-shadow: 0 0 14px var(--cb-glow, var(--candle-amber)), 0 4px 14px rgba(0,0,0,0.6);
    transform: translateY(-4px) scale(1.08);
  }

  /* Footer: permalink + replay + github */
  .cb-footer {
    position: absolute;
    bottom: 2.2vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6vh;
    width: max-content;
    max-width: 92vw;
  }
  .cb-permalink {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.6vh;
    color: var(--parchment-dim);
    text-decoration: none;
    border-bottom: 1px dotted rgba(246,193,112,0.3);
    padding-bottom: 0.2vh;
  }
  .cb-permalink:hover { color: var(--candle-amber); }
  .cb-footer-actions {
    display: flex;
    gap: 1.4vw;
    align-items: center;
  }
  .cb-pill {
    background: transparent;
    border: 1px solid rgba(246,193,112,0.3);
    color: var(--candle-amber);
    font-family: 'IM Fell English SC', serif;
    font-size: 1.3vh;
    letter-spacing: 0.18em;
    padding: 0.9vh 2.4vw;
    border-radius: 999px;
    cursor: pointer;
    text-decoration: none;
    transition: all 200ms;
    text-transform: lowercase;
  }
  .cb-pill:hover {
    border-color: var(--candle-amber);
    background: rgba(40,28,18,0.6);
    box-shadow: 0 0 14px rgba(246,193,112,0.3);
  }

  /* hide the permalink panel — its contents now live inside the card browser */
  #permalink-panel { display: none !important; }
</style>
</head>
<body>

<div id="stage">

  <div id="intro">
    <div id="intro-title">THE CASTING</div>
    <div id="intro-sub">A wagon stands at the edge of the fair. The wind has pushed thee toward its door.</div>
    <button id="intro-enter">Enter the Wagon</button>
  </div>

  <div id="abacus" aria-label="abacus of virtues"></div>

  <div id="table-area">
    <div class="card-slot" id="card-left">
      <div class="card-back-face"></div>
      <div class="card-face"></div>
    </div>
    <div class="card-slot" id="card-right">
      <div class="card-back-face"></div>
      <div class="card-face"></div>
    </div>
  </div>

  <div id="dialogue">
    <div id="dialogue-header">
      <div id="gypsy-avatar"></div>
      <div id="gypsy-name">The Gypsy</div>
    </div>

/* --- helpers --- */
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const sleep = ms => new Promise(r => setTimeout(r, ms));
const V = Object.fromEntries(DATA.virtues.map(v => [v.id, v]));
const pairKey = (a, b) => [a, b].sort().join('-');
const shuffle = arr => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const shortId = () => Math.random().toString(36).slice(2, 8);

/* --- abacus render --- */
function renderAbacus(currentPair = []) {
  const a = $('#abacus');
  a.innerHTML = '';
  for (const v of DATA.virtues) {
    const s = document.createElement('div');
    s.className = 'stone';
    s.style.setProperty('--virtue-color', v.color_hex);
    if (STATE.eliminated.has(v.id)) s.dataset.state = 'dark';
    else if (currentPair.includes(v.id)) s.dataset.state = 'active';
    const label = document.createElement('div');
    label.className = 'stone-label';
    label.textContent = v.id;
    s.appendChild(label);
    a.appendChild(s);
  }
}

/* --- card render --- */
function setCardArt(slotEl, virtueId) {
  const face = slotEl.querySelector('.card-face');
  face.style.backgroundImage = virtueId ? `url('${V[virtueId].card}')` : 'none';
  slotEl.dataset.virtue = virtueId || '';
}
function resetCards() {
  ['#card-left', '#card-right'].forEach(sel => {
    const el = $(sel);
    el.classList.remove('flipped', 'discarded', 'selectable');
    el.style.removeProperty('--discard-x');
    setCardArt(el, null);
  });
}

/* --- audio (Gypsy voice) --- */
let currentAudio = null;
function playAudio(relPath) {
  // relPath is relative to /audio, no extension. e.g. 'gypsy/entry' or 'parables/compassion-honesty'
  if (!relPath) return;
  if (currentAudio) { try { currentAudio.pause(); } catch (e) {} currentAudio = null; }
  const a = new Audio(`audio/${relPath}.mp3`);
  a.volume = 0.95;
  // Browsers may still reject autoplay if the user never interacted; we swallow that.
  a.play().catch(() => {});
  currentAudio = a;
}

/* --- dialogue --- */
async function gypsySpeaks(text, audioKey) {
  const el = $('#gypsy-speech');
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.textContent = text;
  el.classList.add('fade-in');
  if (audioKey) playAudio(`gypsy/${audioKey}`);
}
function setScene(text) {
  $('#scene-text').textContent = text || '';
}
function clearChoices() { $('#choices').innerHTML = ''; }
function nextButton(label, onClick) {
  clearChoices();
  const b = document.createElement('button');
  b.className = 'next-btn';
  b.textContent = label;
  b.addEventListener('click', () => { b.disabled = true; onClick(); });
  $('#choices').appendChild(b);
}

/* ============================================================
   The Casting — state machine
   ============================================================ */

const STATE = {
  roundPool: [],     // virtues being weighed THIS round — fixed for the round, indexed by questionInRound
  nextRound: [],     // winners accumulating for next round
  eliminated: new Set(),  // virtues knocked out so far this session — drives abacus dim state
  round: 1,
  questionInRound: 0,
  totalQuestion: 0,
  history: [],       // { round, q, a, b, chose }
  sessionId: shortId()
};

function startCasting() {
  STATE.roundPool = shuffle(DATA.virtues.map(v => v.id));
  STATE.nextRound = [];
  STATE.eliminated = new Set();
  STATE.round = 1;
  STATE.questionInRound = 0;
  STATE.totalQuestion = 0;
  STATE.history = [];
  STATE.sessionId = shortId();
  renderAbacus();
  resetCards();
  $('#reveal').classList.remove('shown');
  $('#whisper').classList.remove('shown');
  $('#permalink-panel').classList.remove('shown');
  beginGreeting();
}

async function beginGreeting() {
  await gypsySpeaks(DATA.script.entry, 'entry');
  nextButton('Listen', async () => {
    await gypsySpeaks(DATA.script.explanation, 'explanation');
    nextButton('Begin', () => nextQuestion());
  });
}

async function nextQuestion() {
  // Pair the next two from this round's fixed pool.
  const a = STATE.roundPool[STATE.questionInRound * 2];
  const b = STATE.roundPool[STATE.questionInRound * 2 + 1];
  if (!a || !b) { return advanceRound(); }

  STATE.totalQuestion++;
  const isFinal = (STATE.round === 3);
  const framing = isFinal ? DATA.script.before_final : DATA.script.question_framing;
  const framingKey = isFinal ? 'before_final' : 'question_framing';

  await gypsySpeaks(framing, framingKey);
  setScene('');
  clearChoices();
  renderAbacus([a, b]);
  await sleep(600);

  // Lay the two cards face-down.
  resetCards();
  setCardArt($('#card-left'),  a);
  setCardArt($('#card-right'), b);
  await sleep(700);
  // Flip them.
  $('#card-left').classList.add('flipped');
  await sleep(300);
  $('#card-right').classList.add('flipped');
  await sleep(900);

  // Show the parable, and let the Gypsy read its scene aloud.
  const key = pairKey(a, b);
  const parable = DATA.parables[key] || {
    scene: `Thou must weigh ${a} against ${b}. Which calls to thee?`,
    options: { [a]: `Choose ${a}.`, [b]: `Choose ${b}.` }
  };
  setScene(parable.scene);
  // Give the framing line a moment to land before layering the parable on top.
  setTimeout(() => playAudio(`parables/${key}`), 500);
  presentChoices(a, b, parable);
}

function presentChoices(a, b, parable) {
  clearChoices();
  $('#card-left').classList.add('selectable');
  $('#card-right').classList.add('selectable');

  for (const id of [a, b]) {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-virtue">${id.toUpperCase()} — ${V[id].class}</span>${parable.options[id]}`;
    btn.addEventListener('click', () => recordAnswer(a, b, id));
    $('#choices').appendChild(btn);
  }
  // Also allow clicking the card itself as the same answer.
  $('#card-left').onclick  = () => recordAnswer(a, b, a);
  $('#card-right').onclick = () => recordAnswer(a, b, b);
}

async function recordAnswer(a, b, chose) {
  // Lock the UI.
  $('#card-left').onclick = $('#card-right').onclick = null;
  $('#card-left').classList.remove('selectable');
  $('#card-right').classList.remove('selectable');
  clearChoices();

  const dropped = (chose === a) ? b : a;
  STATE.history.push({ round: STATE.round, q: STATE.totalQuestion, a, b, chose });
  STATE.nextRound.push(chose);
  STATE.eliminated.add(dropped);

  // Discard the rejected card with a slide.
  const rejectedSlot = (dropped === a) ? '#card-left' : '#card-right';
  const dir = (dropped === a) ? -1 : 1;
  $(rejectedSlot).style.setProperty('--discard-x', `${dir * 30}vw`);
  $(rejectedSlot).classList.add('discarded');

  // Darken the dropped virtue's stone; keep winner lit.
  await sleep(600);
  renderAbacus([chose]);

  await gypsySpeaks(DATA.script.after_answer, 'after_answer');
  setScene('');
  await sleep(1200);

  STATE.questionInRound++;
  const pairsThisRound = { 1: 4, 2: 2, 3: 1 }[STATE.round];
  if (STATE.questionInRound < pairsThisRound) {
    nextQuestion();
  } else {
    advanceRound();
  }
}

async function advanceRound() {
  STATE.roundPool = STATE.nextRound;
  STATE.nextRound = [];
  STATE.questionInRound = 0;

  if (STATE.round === 1) {
    STATE.round = 2;
    await gypsySpeaks(DATA.script.round_1_to_2, 'round_1_to_2');
    nextButton('Continue', () => {
      // Reshuffle the 4 winners so the bracket isn't deterministic by entry order.
      STATE.roundPool = shuffle(STATE.roundPool);
      renderAbacus();
      nextQuestion();
    });
  } else if (STATE.round === 2) {
    STATE.round = 3;
    await gypsySpeaks(DATA.script.round_2_to_final, 'round_2_to_final');
    nextButton('Continue', () => {
      renderAbacus();
      nextQuestion();
    });
  } else {
    revealFinalCard();
  }
}

async function revealFinalCard() {
  const winner = STATE.roundPool[0];
  const v = V[winner];

  // Hide the in-table cards.
  $('#card-left').classList.add('discarded');
  $('#card-right').classList.add('discarded');
  setScene('');
  clearChoices();
  renderAbacus([winner]);

  // Bring up the full-screen reveal card.
  const reveal = $('#reveal');
  $('#reveal-card').style.backgroundImage = `url('${v.card}')`;
  $('#reveal-card').style.setProperty('--virtue-color', v.color_hex);
  reveal.classList.add('shown');

  await sleep(2400);
  await gypsySpeaks(DATA.script.closing[winner], `closing_${winner}`);

  // Move dialogue forward a beat for the whisper.
  nextButton('…', () => beginWhisper(winner));
}

async function beginWhisper(winner) {
  $('#reveal').classList.remove('shown');
  $('#dialogue').style.opacity = 0;
  const w = $('#whisper');
  $('#whisper-text').textContent = DATA.script.whisper;
  w.classList.add('shown');
  playAudio('gypsy/whisper');
  await sleep(4500);
  endIntoBrowser(winner);
}

async function endIntoBrowser(winner) {
  $('#whisper').classList.remove('shown');
  $('#dialogue').style.display = 'none';
  await sleep(1200);

  // Show the permalink inside the card browser footer.
  const url = `/reading/${winner}-${STATE.sessionId}`;
  const link = $('#cb-permalink');
  link.textContent = url;
  link.href = url;
  link.style.display = '';

  // Open the browser with the chosen virtue selected.
  const idx = DATA.virtues.findIndex(v => v.id === winner);
  openCardBrowser(idx >= 0 ? idx : 0, true);
}

/* ============================================================
   Card Browser — accessible at the end of a reading and at /cards
   ============================================================ */

const CB = { index: 0, cameFromCeremony: false };

function renderCardBrowser() {
  const v = DATA.virtues[CB.index];
  const card = $('#cb-card');
  const mantra = $('#cb-mantra');
  const virtueEl = $('#cb-virtue');
  const meta = $('#cb-meta');
  const desc = $('#cb-desc');
  const cultivateList = $('#cb-cultivate-list');

  // Brief fade between cards.
  card.classList.add('fade');
  mantra.classList.add('fade');
  setTimeout(() => {
    card.style.backgroundImage = `url('${v.card}')`;
    card.style.setProperty('--cb-glow', v.color_hex);
    document.documentElement.style.setProperty('--cb-glow', v.color_hex);
    mantra.textContent = v.mantra;
    virtueEl.textContent = v.id.charAt(0).toUpperCase() + v.id.slice(1);
    meta.innerHTML =
      `<span><b>class</b> ${v.class}</span>` +
      `<span><b>principle</b> ${v.principles}</span>` +
      `<span><b>town</b> ${v.town}</span>` +
      `<span><b>stone</b> ${v.stone}</span>` +
      `<span><b>companion</b> ${v.companion}</span>`;
    desc.textContent = v.description;
    cultivateList.innerHTML = '';
    (v.cultivate || []).forEach(s => {
      const li = document.createElement('li');
      li.textContent = s;
      cultivateList.appendChild(li);
    });
    card.classList.remove('fade');
    mantra.classList.remove('fade');
    renderThumbs();
  }, 200);
}

function renderThumbs() {
  const tn = $('#cb-thumbs');
  tn.innerHTML = '';
  DATA.virtues.forEach((v, i) => {
    const t = document.createElement('div');
    t.className = 'cb-thumb' + (i === CB.index ? ' current' : '');
    t.title = v.id;
    t.style.backgroundImage = `url('${v.card}')`;
    t.style.setProperty('--cb-glow', v.color_hex);
    t.addEventListener('click', () => { CB.index = i; renderCardBrowser(); });
    tn.appendChild(t);
  });
}

function openCardBrowser(startIndex = 0, cameFromCeremony = false) {
  CB.index = Math.max(0, Math.min(7, startIndex));
  CB.cameFromCeremony = cameFromCeremony;
  $('#card-browser').classList.add('cb-shown');
  $('#card-browser').setAttribute('aria-hidden', 'false');
  // Mute any lingering ceremony audio when entering the browser.
  if (currentAudio) { try { currentAudio.pause(); } catch (e) {} }
  renderCardBrowser();
}

function closeCardBrowser() {
  $('#card-browser').classList.remove('cb-shown');
  $('#card-browser').setAttribute('aria-hidden', 'true');
  // Whether opened from the ceremony or from /cards, closing returns to the wagon.
  history.pushState({}, '', '/');
  location.reload();
}

function cbNext() { CB.index = (CB.index + 1) % 8; renderCardBrowser(); }
function cbPrev() { CB.index = (CB.index + 7) % 8; renderCardBrowser(); }

document.addEventListener('keydown', e => {
  if (!$('#card-browser').classList.contains('cb-shown')) return;
  if (e.key === 'Escape')      closeCardBrowser();
  else if (e.key === 'ArrowRight' || e.key === ' ') cbNext();
  else if (e.key === 'ArrowLeft') cbPrev();
  else if (/^[1-8]$/.test(e.key)) { CB.index = parseInt(e.key, 10) - 1; renderCardBrowser(); }
});

/* --- kick off ------------------------------------------------- */

function isCardsRoute() {
  const p = location.pathname.replace(/\/+$/, '');
  return p === '/cards' || p.endsWith('/cards');
}

window.addEventListener('DOMContentLoaded', () => {
  // Wire card-browser buttons once the DOM is ready.
  $('#cb-close').addEventListener('click', closeCardBrowser);
  $('#cb-prev').addEventListener('click', cbPrev);
  $('#cb-next').addEventListener('click', cbNext);
  $('#cb-replay').addEventListener('click', () => { location.assign('/'); });

  // Direct /cards visit bypasses the wagon entirely.
  if (isCardsRoute()) {
    $('#intro').remove();
    $('#dialogue').style.display = 'none';
    $('#abacus').style.display = 'none';
    $('#table-area').style.display = 'none';
    openCardBrowser(0, false);
    return;
  }

  // Otherwise: usual ceremony flow — intro gate, then casting.
  const prefetch = new Audio('audio/gypsy/entry.mp3');
  prefetch.preload = 'auto';

  const enter = () => {
    $('#intro').classList.add('hidden');
    prefetch.play().then(() => prefetch.pause()).catch(() => {});
    setTimeout(startCasting, 800);
  };
  $('#intro-enter').addEventListener('click', enter);
  $('#intro').addEventListener('click', e => { if (e.target.id === 'intro') enter(); });
});
</script>
